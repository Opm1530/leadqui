services:

  # ── Backend API (Express + Prisma) ───────────────────────────────────
  pequi-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pequi-backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    networks:
      - docker_internal
    # Porta só exposta internamente — nginx proxia, não precisa expor ao host
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Frontend (React + Nginx) ──────────────────────────────────────────
  leadqui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: leadqui
    restart: unless-stopped
    networks:
      - docker_internal
    depends_on:
      pequi-backend:
        condition: service_healthy

networks:
  docker_internal:
    external: true
