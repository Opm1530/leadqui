services:

  # ── Backend API (Express + Prisma) ───────────────────────────────────
  pequi-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pequi-backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    networks:
      - docker_internal
    # Porta só exposta internamente — nginx proxia, não precisa expor ao host
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (React + Nginx) ──────────────────────────────────────────
  leadqui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Com nginx proxy interno, a URL da API é relativa ao mesmo domínio
        VITE_API_URL: ""
    container_name: leadqui
    restart: unless-stopped
    networks:
      - docker_internal
    depends_on:
      pequi-backend:
        condition: service_healthy

networks:
  docker_internal:
    external: true
